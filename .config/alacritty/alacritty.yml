# window decoration
window:
  # dimensions:
  #   columns: 10
  #   lines: 0
  # position:
  #   x: 10
  #   y: 0

  padding: 
    x: 7
    y: 7

  dynamic_padding: true
  #     - full: Borders and title bar
  #     - none: Neither borders nor title bar
  decorations: none

  #   - Windowed - Maximized - Fullscreen
  # startup_mode: Maximized

# Window title
title: Alacritty
  #dynamic_title: true
  # Override the variant of the GTK theme. Commonly supported values are `dark`
  # and `light`. Set this to `None` to use the default theme variant.
gtk_theme_variant: "dark"

#scrolling:
  # Maximum number of lines in the scrollback buffer.
  # Specifying '0' will disable scrolling.
  #history: 10000

  # Scrolling distance multiplier.
  #multiplier: 3

# Font configuration
font:
  normal:
    family: MesloLGS NF 
    style: Regular
  
  size: 14

  offset:
   x: 0
   y: 0

  glyph_offset:
   x: 0
   y: 0

draw_bold_text_with_bright_colors: true

colors:
  primary:
   background: '#1d1f21'
   foreground: '#c5c8c6'    #2a9d8f

  cursor:
   text: CellBackground
   cursor: CellForeground

  search:
    matches:
     foreground: '#000000'
     background: '#ffffff'
    focused_match:
     foreground: '#ffffff'
     background: '#000000'

    bar:
     background: '#c5c8c6'
     foreground: '#1d1f21'

  # Keyboard regex hints
  hints:
    start:
     foreground: '#1d1f21'
     background: '#e9ff5e'

    end:
     foreground: '#e9ff5e'
     background: '#1d1f21'

  #line_indicator:
  #  foreground: None
  #  background: None

  selection:
   text: CellBackground
   background: CellForeground

  normal:
   black:   '#1d1f21'
   red:     '#cc6666'
   green:   '#42c954'
   yellow:  '#f0c674'
   blue:    '#81a2be'
   magenta: '#b294bb'
   cyan:    '#8abeb7'
   white:   '#c5c8c6'

  bright:
   black:   '#666666'
   red:     '#d54e53'
   green:   '#b9ca4a'
   yellow:  '#e7c547'
   blue:    '#7aa6da'
   magenta: '#c397d8'
   cyan:    '#70c0b1'
   white:   '#eaeaea'

  dim:
   black:   '#131415'
   red:     '#864343'
   green:   '#777c44'
   yellow:  '#9e824c'
   blue:    '#556a7d'
   magenta: '#75617b'
   cyan:    '#5b7d78'
   white:   '#828482'

  # Indexed Colors
  #
  # The indexed colors include all colors from 16 to 256.
  # When these are not set, they're filled with sensible defaults.
  #
  # Example:
  #   `- { index: 16, color: '#ff00ff' }`
  #
  #indexed_colors: []

bell:
  #   - Ease
  #   - EaseOut
  #   - EaseOutSine
  #   - EaseOutQuad
  #   - EaseOutCubic
  #   - EaseOutQuart
  #   - EaseOutQuint
  #   - EaseOutExpo
  #   - EaseOutCirc
  #   - Linear
  animation: Linear
  duration: 100
  color: '#1e211f'

  # Example:
  #   command:
  #     program: notify-send
  #     args: ["Hello, World!"]
  
  #command: None

background_opacity: 0.9

#selection:
  # This string contains all characters that are used as separators for
  # "semantic words" in Alacritty.
  #semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"

  # When set to `true`, selected text will be copied to the primary clipboard.
  #save_to_clipboard: false

cursor:
  style:
    shape: Underline     # (▇ Block1, _ Underline, | Beam)
    blinking: Never      # - Never: - Off:- On:- Always: 

  blink_interval: 750
  unfocused_hollow: false
  thickness: 0.15
